{% extends "based_layout.html" %}

{% load static %}

{% block style %}
    <link rel="stylesheet" href="{% static 'css/features/catalog.css' %}">
{% endblock %}

{% block title %}Фишки{% endblock %}


{% block center-content %}

    <div id="features_catalog">

        <div id="statistic" class="feature">
            <a href="/features/statistic/">
                <figure>
                    <img src="{% static 'img/features_catalog/statistics1.png' %}" alt="">
                    <figcaption>СТАТИСТИКА</figcaption>
                </figure>
            </a>

        </div>

        <div id="casino" class="feature">
            <a href="/features/casino/">
                <figure>
                    <img src="{% static 'img/features_catalog/casino.jpeg' %}" alt="">
                    <figcaption>КАЗИНО</figcaption>
                </figure>
            </a>

        </div>

        <div id="tarots" class="feature">
            <a href="/features/tarot/">
                <figure>
                    <img src="{% static 'img/features_catalog/tarots1.jpg' %}" alt="">
                    <figcaption>ТАРО</figcaption>
                </figure>
            </a>

        </div>

        <div id="gym" class="feature">
            <a href="/features/gym/">
                <figure>
                    <img src="{% static 'img/features_catalog/gym1.png' %}" alt="">
                    <figcaption>Gym</figcaption>
                </figure>
            </a>

        </div>

    </div>

{% endblock %}
